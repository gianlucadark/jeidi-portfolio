<div class="page">
  <app-blobs mode="hero" [mouse]="mouseService.mouse()"/>
  <app-corner-logo/>
  <section class="section">
    <div class="inner">
      <app-circle-arrow direction="left" (clicked)="nav.navigate('design')"/>
      <h1 class="page-title">Social media design</h1>
      @for (p of projects; track p.id) {
        <app-brand-project-card [project]="p" (clicked)="nav.navigate(p.id)"/>
      }
    </div>
  </section>
  <app-footer/>
</div>
