<div class="page">
  <app-blobs mode="hero" [mouse]="mouseService.mouse()"/>
  <app-corner-logo/>
  <section class="section">
    <div class="inner">
      <h1 class="page-title">Social media design</h1>
      @for (p of projects(); track p.id) {
        <app-brand-project-card [project]="p" (clicked)="nav.navigate(p.id)"/>
      }
    </div>
  </section>
  <div class="sub-panels">
    <button class="sub-panel" data-hover="image"
      style="background-image:linear-gradient(rgba(0,0,0,0.4),rgba(0,0,0,0.4)),url(brand-uxui.jpg)"
      (click)="nav.navigate('uxui')">
      <span>{{ langService.t('panel.uxui') }}</span>
    </button>
    <button class="sub-panel" data-hover="image"
      style="background-image:linear-gradient(rgba(0,0,0,0.4),rgba(0,0,0,0.4)),url(ideate-5.jpg)"
      (click)="nav.navigate('brand')">
      <span>{{ langService.t('panel.brand') }}</span>
    </button>
  </div>
  <app-footer/>
</div>
