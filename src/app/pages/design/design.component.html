<div class="page">
  <app-corner-logo/>
  <div class="panels">
    @for (panel of panels; track panel.id) {
      <button class="panel"
        data-hover="image"
        [style.background-image]="'linear-gradient(rgba(0,0,0,0.45),rgba(0,0,0,0.45)),url(' + panel.img + ')'"
        (click)="nav.navigate(panel.id)">
        <span class="panel-label" [innerHTML]="langService.t(panel.labelKey)"></span>
      </button>
    }
  </div>
</div>
