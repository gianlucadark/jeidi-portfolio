<nav class="nav">
  @for (item of items; track item.id) {
    <button
      data-hover="nav"
      [class.active]="isActive(item.path)"
      [style.color]="textColor()"
      (click)="nav.navigate(item.id)">
      {{ langService.t(item.labelKey) }}
    </button>
  }
</nav>
<div class="lang-toggle" [style.color]="textColor()">
  <button class="lang-btn" [class.active]="langService.lang() === 'it'" (click)="setLang('it')">IT</button>
  <span class="lang-sep">/</span>
  <button class="lang-btn" [class.active]="langService.lang() === 'en'" (click)="setLang('en')">EN</button>
</div>
