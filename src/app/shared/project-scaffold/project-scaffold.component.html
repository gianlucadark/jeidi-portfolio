<div class="page">
  <app-blobs mode="hero" [mouse]="mouseService.mouse()"/>
  <section class="section">
    <div class="inner">
      <div class="title-block">
        <h1 class="page-title">{{ title() }}</h1>
        @if (tagline()) {
          <p class="tagline">{{ tagline() }}</p>
        }
      </div>
      @if (hero()) {
        <app-reveal-image [src]="hero()" aspect="1647/824"/>
      }
      <div class="project-info">
        <h2 class="subtitle">{{ subtitle() }}</h2>
        <p class="body-text">{{ body() }}</p>
      </div>
      <app-project-grid [images]="grid()" [layout]="layout()"/>
      @if (credits().length) {
        <div class="credits">
          <p class="credits-label">{{ creditsLabel() }}</p>
          <ul>
            @for (c of credits(); track c) {
              <li>{{ c }}</li>
            }
          </ul>
        </div>
      }
    </div>
  </section>
  <app-footer/>
</div>
