<div class="mobile-header">
  <button class="logo-btn" aria-label="Home" (click)="navService.navigate('home')">
    <app-logo [size]="34"/>
  </button>
  <button class="hamburger" aria-label="Menu" (click)="open.set(!open())">
    <span [style.width]="open() ? '20px' : '16px'"></span>
    <span style="width:20px"></span>
  </button>
</div>
<div class="overlay" [class.open]="open()">
  @for (item of items; track item.id; let i = $index) {
    <button
      class="overlay-item"
      [class.item-visible]="open()"
      [style.transition-delay]="(0.2 + i * 0.08) + 's'"
      (click)="go(item.id)">
      {{ langService.t(item.labelKey) }}
    </button>
  }
  <div class="lang-row" [class.item-visible]="open()" [style.transition-delay]="'0.65s'">
    <button class="lang-opt" [class.active]="langService.lang() === 'it'" (click)="setLang('it')">IT</button>
    <span class="lang-sep">/</span>
    <button class="lang-opt" [class.active]="langService.lang() === 'en'" (click)="setLang('en')">EN</button>
  </div>
</div>
